// The litcache at-rest manifest and its parts (structural model: docs/design/litcache-manifest.md).
// A durable, authored contract: binary proto at rest, gated additively. This proto is the source of
// truth; the committed themis/litcache/models/litcache_pb2 stubs are generated from it.

syntax = "proto3";

package themis.litcache.models.litcache;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

enum SourceKind {
  SOURCE_KIND_UNSPECIFIED = 0;
  SOURCE_KIND_PMC_OA_S3 = 1;
  SOURCE_KIND_EUROPE_PMC = 2;
  SOURCE_KIND_ELSEVIER_OA = 3;
  SOURCE_KIND_BIORXIV = 4;
  SOURCE_KIND_UPLOAD = 5;
  SOURCE_KIND_SEED = 6;
}

// Scraped html is converted to xml upstream and enters as media_type xml under a distinct
// handle — html is not a media type here.
enum SourceFormat {
  SOURCE_FORMAT_UNSPECIFIED = 0;
  SOURCE_FORMAT_XML = 1;
  SOURCE_FORMAT_PDF = 2;
}

enum LicenceBasis {
  LICENCE_BASIS_UNSPECIFIED = 0;
  LICENCE_BASIS_ARTIFACT = 1;  // read from the fetched bytes (JATS <license>, Elsevier metadata)
  LICENCE_BASIS_ASSERTED = 2;  // bytes carry no licence: an access authority supplies it
}

enum Converter {
  CONVERTER_UNSPECIFIED = 0;
  CONVERTER_LITDOWN = 1;
  CONVERTER_DOCLING = 2;
  CONVERTER_LLM_OCR = 3;  // vision-model OCR of the pdf — preferred pdf route; docling is the fallback
}

message FreeToRead {}

message Licensed {
  string publisher = 1 [(buf.validate.field).string.min_len = 1];
}

message InstitutionCaptured {}

message UnknownAccess {}

// Access disposition of a lineage. A oneof so a publisher exists iff the variant is
// `licensed`: the access-iff-publisher invariant holds structurally, and protovalidate
// requires exactly one variant set.
message Access {
  oneof kind {
    option (buf.validate.oneof).required = true;

    FreeToRead free_to_read = 1;
    Licensed licensed = 2;
    InstitutionCaptured institution_captured = 3;
    UnknownAccess unknown = 4;
  }
}

// One fetched byte-set of a lineage. Content-addressed at sources/{handle}/{hex}.{ext};
// current = latest captured_at, never array order.
message Revision {
  string hash = 1;  // sha256 hex digest of the raw source bytes
  optional string origin_url = 2;  // external provenance (the OA fetch URL); omitted for seed/upload
  SourceKind kind = 3;
  google.protobuf.Timestamp captured_at = 4;
  optional bool has_text_layer = 5;  // pdf only: a recoverable text layer (enables quote->bbox)
}

// A primary-artifact lineage. `handle` is stable identity across updates; `revisions` is
// append-only, ordered by captured_at (current = latest). Licence and access are stable
// across a lineage's revisions; the converter is not part of the lineage (a Rendering
// records it).
message Source {
  string handle = 1;  // lineage identity, stable across updates: "pdf" | "jats-xml" | "scraped-html"
  SourceFormat media_type = 2;
  string licence = 3;  // raw, as litfetch returned it (not an SPDX id)
  LicenceBasis licence_basis = 4;
  Access access = 5 [(buf.validate.field).required = true];
  repeated Revision revisions = 6 [(buf.validate.field).repeated.min_items = 1];
}

// Markdown derived from one revision via one route. Content-addressed at renderings/{hex}.md
// (the Manifest.renderings key is that hash).
message Rendering {
  option (buf.validate.message).cel = {
    id: "rendering.model_iff_llm_ocr"
    message: "model must be set iff converter is CONVERTER_LLM_OCR (=3)"
    expression: "(this.converter == 3) == (this.model != '')"
  };

  string from_source = 1;  // Source.handle (an open id namespace, not an enum)
  string from_revision = 2;  // the Revision.hash this markdown was produced from
  Converter converter = 3;
  string converter_version = 4;  // the converter tool/harness version
  optional string model = 5;  // free-text LLM id (e.g. "claude-opus-4-8"); set iff converter is llm_ocr
  google.protobuf.Timestamp created_at = 6;
}

message ExternalIds {
  optional string doi = 1;
  optional string pmid = 2;
  optional string pmcid = 3;
  optional string arxiv = 4;
  optional string biorxiv = 5;
}

message Equivalence {
  repeated string edges = 1;
  string canonical_doc_id = 2;
}

message Retraction {
  optional bool retracted = 1;
  optional string source = 2;
  optional string date = 3;
}

enum AssociatedFileRole {
  ASSOCIATED_FILE_ROLE_UNSPECIFIED = 0;
  ASSOCIATED_FILE_ROLE_FIGURE = 1;
  ASSOCIATED_FILE_ROLE_SUPPLEMENTARY = 2;
}

message AssociatedFile {
  AssociatedFileRole role = 1;
  string name = 2;
  optional string source_url = 3;
  optional string path = 4;  // content-addressed bytes' location (supplementary/{hex}.{ext}); absent until fetched
}

message Manifest {
  string doc_id = 1;  // uuid4, == directory name
  ExternalIds external_ids = 2;
  string claim_key = 3;  // precedence-primary external id, e.g. "doi:10.…"
  Equivalence equivalence = 4;
  Retraction retraction = 5;
  repeated Source sources = 6;  // primary-artifact lineages (pdf, jats-xml, …)
  map<string, Rendering> renderings = 7;  // key = the markdown's content hash (sha256 hex)
  repeated AssociatedFile files = 8;  // every KNOWN supplementary file, even un-fetched (lazy fetch)
}
