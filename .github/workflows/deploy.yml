name: deploy

# Deploys to dev on merge to main: build the web image, push to Artifact
# Registry, then `pulumi up`. Authenticates as the deploy SA via WIF (scoped to
# refs/heads/main tokens). PRs never reach this — they get a read-only preview
# (preview.yml). See docs/design/deployment.md.
on:
  push:
    branches: [main]

concurrency:
  group: themis-deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - run: uv sync --locked --group infra --python 3.13

      - uses: google-github-actions/auth@v3
        with:
          project_id: cpg-themis-dev
          workload_identity_provider: projects/698160839187/locations/global/workloadIdentityPools/github/providers/github
          service_account: themis-deploy@cpg-themis-dev.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v3

      - name: Build and push web image
        run: |
          IMAGE="australia-southeast1-docker.pkg.dev/cpg-themis-dev/themis/web:${GITHUB_SHA}"
          gcloud auth configure-docker australia-southeast1-docker.pkg.dev --quiet
          docker build -t "$IMAGE" apps/web
          docker push "$IMAGE"
          echo "THEMIS_WEB_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - uses: pulumi/actions@v7
        with:
          command: up
          stack-name: dev
          work-dir: infra
          cloud-url: gs://cpg-themis-dev-pulumi-state
