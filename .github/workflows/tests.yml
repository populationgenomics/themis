name: tests

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]
  push:
    branches: [main]

jobs:
  pytest:
    # Skip on the public mirror (themis), and skip draft PRs.
    if: |
      github.repository == 'populationgenomics/themis-internal'
      && (github.event_name != 'pull_request' || !github.event.pull_request.draft)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      # The sandbox_worker integration tests need bubblewrap; without it they skip
      # (postern.available() is False). ubuntu-latest (24.04) restricts unprivileged
      # user namespaces via AppArmor — lift it so bwrap can launch (Cloud Run gen2,
      # the deploy target, has no such restriction). The guest uses only stdlib, so
      # no in-guest grpcio is needed (the hatch runs in the test process).
      - run: |
          sudo apt-get update && sudo apt-get install -y bubblewrap
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - run: uv sync --locked --group test --python 3.13
      # No path arg: collect the testpaths configured in pyproject.toml.
      - run: uv run pytest
