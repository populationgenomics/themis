name: schema-compat

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]
  push:
    branches: [main]

jobs:
  backward-compatible:
    # `buf breaking` is the sole authored-data compat gate — it diffs every committed
    # proto contract (RPC and at-rest) against its baseline; a pre-release contract is
    # skipped until it stabilizes (tools/schema/buf_compat.py). Skip on the
    # public mirror (themis), and skip draft PRs.
    if: |
      github.repository == 'populationgenomics/themis-internal'
      && (github.event_name != 'pull_request' || !github.event.pull_request.draft)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Full history: the gate diffs the committed artifact against its baseline
      # commit (the PR base tip, or HEAD^ on a push to main).
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      # Baseline = the released line. For a PR that is the base branch tip; on a
      # push to main it is the previous commit. (buf runs via a pinned `docker
      # run`; Docker is preinstalled on the runner.)
      - name: Resolve baseline ref
        id: baseline
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=HEAD^" >> "$GITHUB_OUTPUT"
          fi
      - run: uv run python -m tools.schema.buf_compat --baseline-ref "${{ steps.baseline.outputs.ref }}"
