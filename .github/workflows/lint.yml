name: lint

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]
  push:
    branches: [main]

jobs:
  pre-commit:
    # Runs every hook in .pre-commit-config.yaml — the whole static-check gate.
    # Skip on the public mirror (themis), and skip draft PRs.
    if: |
      github.repository == 'populationgenomics/themis-internal'
      && (github.event_name != 'pull_request' || !github.event.pull_request.draft)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      # buf on PATH for the buf-lint hook.
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.66.1"
      # biome + tsc hooks need apps/web/node_modules.
      - run: bun install --frozen-lockfile
        working-directory: apps/web
      # Pre-sync the lint env so the pyright hook's `uv run` is a no-op.
      - run: uv sync --locked --group lint --python 3.13
      - uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - run: uv run pre-commit run --all-files --show-diff-on-failure
