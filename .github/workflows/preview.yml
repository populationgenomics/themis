name: preview

# Read-only `pulumi preview` on PRs, posted as a comment to inform the single
# PR-approval gate. Authenticates as the read-only preview SA via WIF (scoped to
# pull_request tokens); write access is main-only (deploy.yml). PRs never deploy.
# See docs/design/deployment.md.
on:
  pull_request:
    types: [opened, ready_for_review, synchronize, reopened]

concurrency:
  group: themis-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    # Skip on the public mirror (themis), and skip draft PRs.
    if: |
      github.repository == 'populationgenomics/themis-internal'
      && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --locked --group infra --python 3.13
      - uses: google-github-actions/auth@v3
        with:
          project_id: cpg-themis-dev
          workload_identity_provider: projects/698160839187/locations/global/workloadIdentityPools/github/providers/github
          service_account: themis-preview@cpg-themis-dev.iam.gserviceaccount.com
      # Images are pinned in-program: each Cloud Run image falls back to the live
      # deployment when its THEMIS_*_IMAGE override is unset (infra/__main__.py).
      - uses: pulumi/actions@v7
        with:
          command: preview
          stack-name: dev
          work-dir: infra
          cloud-url: gs://cpg-themis-dev-pulumi-state
          comment-on-pr: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
