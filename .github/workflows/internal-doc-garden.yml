name: doc garden

on:
  schedule:
    # Midnight Sydney/Melbourne on workdays. GitHub cron is UTC with no DST:
    # 00:00 Mon–Fri AEST (UTC+10) = 14:00 the previous day UTC, i.e. Sun–Thu.
    # During AEDT (UTC+11, ~Oct–Apr) this fires at 01:00 local — accepted slip.
    - cron: "0 14 * * 0-4"
  workflow_dispatch: {}

jobs:
  doc-garden:
    name: doc garden
    if: github.repository == 'populationgenomics/themis-internal'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: doc-garden
      cancel-in-progress: false
    permissions:
      contents: read # the App token (below) does the writing
      id-token: write # WIF token exchange for the Claude API
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.DOC_GARDEN_APP_CLIENT_ID }}
          private-key: ${{ secrets.DOC_GARDEN_APP_PRIVATE_KEY }}
          owner: populationgenomics
          repositories: themis-internal

      - uses: actions/checkout@v6
        with:
          # Full history so the agent can read `git log` when judging whether a
          # "coming soon" note is stale. persist-credentials: false keeps any
          # token out of the working tree's .git/config — the agent step runs
          # next and must not be able to reach a push-capable credential. The
          # default GITHUB_TOKEN (contents: read) is enough to check out; the
          # publish step supplies the App token explicitly for its push, and the
          # PR is opened via the App token in `gh` (what makes the required
          # pull_request checks fire — the default GITHUB_TOKEN would not emit
          # those events).
          fetch-depth: 0
          persist-credentials: false

      # Concatenate the instruction file and a fresh broken-link report into the
      # prompt (the action has no prompt_file input). Mirrors internal-review.yml.
      - name: Prepare doc-garden prompt inputs
        run: |
          {
            echo 'INSTRUCTIONS<<INSTRUCTIONS_EOF'
            cat .github/doc-garden/instructions.md
            echo
            echo 'INSTRUCTIONS_EOF'
          } >> "$GITHUB_ENV"
          # check_links.py exits non-zero when it finds broken links (the
          # expected case); `|| true` keeps that from failing the step, so its
          # report is still captured into LINK_REPORT.
          {
            echo 'LINK_REPORT<<LINK_REPORT_EOF'
            python3 tools/check_links.py || true
            echo 'LINK_REPORT_EOF'
          } >> "$GITHUB_ENV"

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          # WIF, not a stored key (a static key outranks federation and silently
          # wins). Reuses the cpg-themis-ci-review svac via an added rule pinned
          # to the schedule/main-ref subject. See docs/runbooks/claude-api-wif.md
          # Path C.
          anthropic_federation_rule_id: fdrl_01KdBLWjujcYsH9s9j1K63Wb
          anthropic_organization_id: 0c504942-5311-4fc0-a3a3-1f6a53666205
          anthropic_service_account_id: svac_01KJXbuSvwDHvT8PFQkU7nef
          anthropic_workspace_id: wrkspc_014YcYcGz7XBbARzLRHwvhZt
          prompt: |
            REPO: ${{ github.repository }}

            You are the scheduled documentation-gardening agent for
            `populationgenomics/themis-internal`, the private working tree for
            the Themis platform. Every commit that lands on `main` mirrors 1:1
            to the public `populationgenomics/themis` repo.

            Audit the repo's tracked documentation against the real code and
            tree, and fix the drift you can confidently fix — editing files in
            place. A later workflow step turns your edits into a pull request:
            you do not open or modify pull requests, and you do not run mutating
            git.

            A broken-link and dead-anchor report from `tools/check_links.py`,
            run over the current tree, follows. Use it as the candidate list for
            the broken-link and stale-anchor classes; judge each hit per the
            instructions (some may be intentional forward references).

            <link-report>
            ${{ env.LINK_REPORT }}
            </link-report>

            Full instructions follow.

            ${{ env.INSTRUCTIONS }}
          claude_args: |
            --allowedTools "Read,Grep,Glob,Edit(*.md),Write(*.md),Bash(rg:*),Bash(git ls-files:*),Bash(git diff:*),Bash(git status:*),Bash(git log:*),Bash(grep:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(ls:*),Bash(sort:*),Bash(uniq:*),Bash(wc:*)"

      - name: Publish fix-up PR (only if drift was fixed)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          EXEC_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          set -euo pipefail

          # Authoring new docs is out of scope; an untracked file means the agent
          # created something. Fail loudly rather than dropping it past `add -u`.
          untracked="$(git ls-files --others --exclude-standard)"
          if [ -n "$untracked" ]; then
            echo "ERROR: agent left untracked files (authoring is out of scope):" >&2
            printf '%s\n' "$untracked" >&2
            exit 1
          fi

          # The agent's final message is its per-run notes (best-guess fixes,
          # drift left for the author). Echo it to the job log unconditionally so
          # a report-only run — which opens no PR — still records its findings
          # here, not only in the 14-day execution-log artifact.
          report="$(jq -r '(.[] | select(.type == "result") | .result) // ""' "$EXEC_FILE" 2>/dev/null || true)"
          if [ -n "$report" ]; then
            printf '::group::doc-garden agent notes\n%s\n::endgroup::\n' "$report"
          fi

          # A report-only run (drift found, none editable) leaves no diff, so
          # there is nothing to open a PR against; the notes above are its record.
          if git diff --quiet; then
            echo "No drift fixed; nothing to publish."
            exit 0
          fi

          # PR body = fixed preamble + the same notes.
          body_file="$(mktemp)"
          cat .github/doc-garden/pr-body.md > "$body_file"
          if [ -n "$report" ]; then
            { printf '\n---\n\n'; printf '%s\n' "$report"; } >> "$body_file"
          fi

          git config user.name  "themis-doc-garden[bot]"
          git config user.email "themis-doc-garden[bot]@users.noreply.github.com"

          # doc-garden/rolling is bot-owned and reset from main each run, so the
          # force-push is its normal update; the concurrency group serialises
          # runs, so there is no concurrent writer to clobber. Push with the App
          # token inline (the checkout did not persist it); the token is masked
          # in logs by create-github-app-token.
          git checkout -B doc-garden/rolling
          git add -u
          git commit -m "docs: scheduled doc-gardening fix-ups"
          git push --force \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            doc-garden/rolling

          # One rolling PR: the force-push already refreshed the diff of any open
          # one; refresh its body too, or open a new PR when none is open.
          num="$(gh pr list --head doc-garden/rolling --state open --json number --jq '.[0].number // ""')"
          if [ -z "$num" ]; then
            gh pr create --base main --head doc-garden/rolling \
              --title "docs: scheduled doc-gardening fix-ups" \
              --body-file "$body_file"
          else
            gh pr edit "$num" --body-file "$body_file"
          fi

      - name: Upload doc-garden execution log
        # always() so the transcript is captured even when a step above fails.
        if: always() && steps.claude.outputs.execution_file != ''
        uses: actions/upload-artifact@v7
        with:
          name: claude-doc-garden-execution-output
          path: ${{ steps.claude.outputs.execution_file }}
          retention-days: 14
