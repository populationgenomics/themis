name: web

# Lint, typecheck, and build the Next.js web app on PRs and pushes to main. The
# image build + deploy is owned by deploy.yml (main only); this is the pre-merge
# gate on apps/web. Bun toolchain; see apps/web/README.md.
on:
  pull_request:
    types: [opened, ready_for_review, synchronize]
  push:
    branches: [main]

jobs:
  web:
    # Skip on the public mirror (themis), and skip draft PRs.
    if: |
      github.repository == 'populationgenomics/themis-internal'
      && (github.event_name != 'pull_request' || !github.event.pull_request.draft)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      # --frozen-lockfile fails if package.json and bun.lock have drifted.
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run build
