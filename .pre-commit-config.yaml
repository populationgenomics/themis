# Type checking runs in CI (pyright). Skipped from pre-commit because
# pyright is slower than is comfortable for a per-commit hook.
default_language_version:
  python: python3.13

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: detect-private-key
      - id: debug-statements
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
      - id: ruff-format

  # Biome lint+format for the Next.js web app, via the project's Bun toolchain.
  # Requires `bun install` in apps/web — the hook fails with a hint if its
  # node_modules is missing. Verify-only (matches CI `bun run lint`); run
  # `bun run format` to fix. Whole-app check (pass_filenames: false): fine while
  # the app is small; switch to per-file if it grows.
  - repo: local
    hooks:
      - id: biome
        name: biome (apps/web; needs `bun install` in apps/web)
        entry: "bash -c 'cd apps/web && { [ -d node_modules ] || { echo \"apps/web/node_modules missing — run: bun install --cwd apps/web\"; exit 1; }; } && bun run lint'"
        language: system
        files: ^apps/web/
        pass_filenames: false

  # Markdown formatter (Biome can't format Markdown). mdformat is CommonMark-strict, so
  # intraword `_` (snake_case identifiers) stays literal and fenced code (mermaid, yaml/
  # json examples) is left untouched. Plugins: gfm (tables, strikethrough, task lists,
  # autolinks); frontmatter (YAML headers in .claude/rules/*.md). Prose wrapped at 120.
  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        args: ["--wrap", "120"]
        additional_dependencies:
          - mdformat-gfm==1.0.0
          - mdformat-frontmatter==2.1.2
        exclude: ^tests/.*/fixtures/ # committed fixtures are verbatim test data

  # YAML formatter (Biome can't format YAML).
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
