# lint.yml runs `pre-commit run --all-files`, so this config is the CI gate too:
# a hook added here is gated in CI with no workflow edit. pytest (tests.yml) and
# the web build (web.yml) stay separate CI jobs — too slow for the per-commit path.
default_language_version:
  python: python3.13

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      # Generated stubs are committed verbatim from buf generate; a hygiene rewrite would
      # drift them from the generator and break the freshness gate.
      - id: end-of-file-fixer
        exclude: '^(themis/rpc/|themis/litcache/models/|buf/|apps/web/src/gen/)'
      - id: trailing-whitespace
        exclude: '^(themis/rpc/|themis/litcache/models/|buf/|apps/web/src/gen/)'
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: detect-private-key
      - id: debug-statements
      # litcache test fixtures include a real CC-BY paper's pdf (~800 KB); raise
      # the 500 KB default to admit it while still catching multi-MB accidents.
      - id: check-added-large-files
        args: [--maxkb=1024]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
      - id: ruff-format

  # pyright needs the project deps (pydantic, pulumi) to resolve imports, so it
  # runs in the lint env via `uv run`; `--group lint` provisions it on demand.
  # Whole-project, so pass_filenames: false; fires on any staged .py.
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run --group lint pyright
        language: system
        files: \.py$
        pass_filenames: false
      # buf lint: the hand-authored protos' canonical-enum + structural discipline (buf.yaml).
      # Whole-module (pass_filenames: false); fires on any staged .proto. Needs buf on PATH.
      - id: buf-lint
        name: buf lint
        entry: buf lint
        language: system
        files: \.proto$
        pass_filenames: false

  # Web app checks via the project's Bun toolchain: biome (lint+format) and tsc
  # --noEmit. Both need `bun install` in apps/web — each hook prints a hint if
  # node_modules is missing. biome is verify-only; run `bun run format` to fix.
  # Whole-app checks (pass_filenames: false): fine while the app is small.
  - repo: local
    hooks:
      - id: biome
        name: biome (apps/web; needs `bun install` in apps/web)
        entry: "bash -c 'cd apps/web && { [ -d node_modules ] || { echo \"apps/web/node_modules missing — run: bun install --cwd apps/web\"; exit 1; }; } && bun run lint'"
        language: system
        files: ^apps/web/
        pass_filenames: false
      - id: typecheck-web
        name: tsc --noEmit (apps/web; needs `bun install` in apps/web)
        entry: "bash -c 'cd apps/web && { [ -d node_modules ] || { echo \"apps/web/node_modules missing — run: bun install --cwd apps/web\"; exit 1; }; } && bun run typecheck'"
        language: system
        files: ^apps/web/
        pass_filenames: false

  # Markdown formatter (Biome can't format Markdown). mdformat is CommonMark-strict, so
  # intraword `_` (snake_case identifiers) stays literal and fenced code (mermaid, yaml/
  # json examples) is left untouched. Plugins: gfm (tables, strikethrough, task lists,
  # autolinks); frontmatter (YAML headers in .claude/rules/*.md). Prose wrapped at 120.
  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        args: ["--wrap", "120"]
        additional_dependencies:
          - mdformat-gfm==1.0.0
          - mdformat-frontmatter==2.1.2
        # Verbatim payloads mdformat must not reflow: test data under tests/, and the
        # doc-garden workflow payloads (pr-body.md is posted as-is — hard wraps would
        # render as `<br>` in GitHub's PR view, which breaks on single newlines).
        exclude: '^(tests/|\.github/doc-garden/)'

  # YAML formatter (Biome can't format YAML).
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
